<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f4f4f4;
}

/* CONTAINER */
.map-container {
  position: relative;
  width: 1000px;
  max-width: 1280px;
  margin: 30px auto;
}

/* GAMBAR */
.map-image {
  width: 100%;
  display: block;
}

/* SVG */
.map-overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
}

/* AREA DASAR */
.area {
  stroke: transparent;
  cursor: pointer;
  transition: 0.2s;
}

/* HOVER (tidak merusak warna asli) */
.area:hover {
  stroke: #ffffff9b;
}

/* ACTIVE */
.area.active {
  stroke: #00ffff;
  stroke-width: 2;
  filter: drop-shadow(0 0 6px #00ffff7c);
}

/* MODAL */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.75);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 999;
}

/* BOX */
.modal-content {
  width: 900px;
  background: #1e1e1e;
  color: white;
  border-radius: 12px;
  padding: 20px;
  display: flex;
  gap: 20px;
  position: relative;
  overflow: hidden;
  
}



@keyframes fadeIn {
  from {opacity:0; transform:scale(0.9);}
  to {opacity:1; transform:scale(1);}
}

/* GAMBAR */
.modal img {
  width: 380px;
  border-radius: 10px;
  object-fit: cover;
}

/* TEKS */
.modal-text {
  flex: 1;
}

.modal-text h2 {
  margin: 0;
}

.modal-text h3 {
  margin-top: 10px;
  color: #00ffaa;
}

/* CLOSE */
.close-btn {
  position: absolute;
  top: 10px;
  right: 15px;
  font-size: 26px;
  cursor: pointer;
}
</style>

    ]
  },

  muna: {
    wilayah: "Kabupaten Muna",
    pelabuhan: "PP Laino",
    luas: "20,10 Ha",
    status: "Aktif",
    gambar: "images/Laino2.jpg",
    fasilitas: [
      "Dermaga","Jalan Kompleks","Pemasaran Ikan","Pos Jaga"
    ]
  }
};

/* OPEN MODAL */
function openModal(id, element) {
  const data = wilayahData[id];

  document.querySelectorAll('.area').forEach(el => el.classList.remove('active'));
  element.classList.add('active');

  document.getElementById("modal-img").src = data.gambar;

  document.getElementById("modal-text").innerHTML = `
    <h2>${data.wilayah}</h2>
    <h3>${data.pelabuhan}</h3>

    <p><b>Luas:</b> ${data.luas}</p>
    <p><b>Status:</b> ${data.status}</p>

    <p><b>Memiliki Fasilitas:</b></p>
    <ul>
      ${data.fasilitas.map(f => `<li>${f}</li>`).join("")}
    </ul>
  `;

  document.getElementById("modal").style.display = "flex";
}



/* CLOSE */
function closeModal() {
  document.getElementById("modal").style.display = "none";

  document.querySelectorAll('.area').forEach(el => {
    el.classList.remove('active');
  });
}
</script>
